services:
  - type: web
    name: restaurant-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html